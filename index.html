<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000010">
<meta name="format-detection" content="telephone=no">
<title>CYBER RUNNER — 黒工電子科</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
html{width:100%;height:100%;overflow:hidden;background:#000;}
body{
  width:100%;
  /* 100vh はモバイルのアドレスバー伸縮で不安定なため、JSで実測したpx値を --vh-real に格納し優先使用する */
  height:calc(var(--vh-real, 1px) * 100);
  min-height:-webkit-fill-available;
  overflow:hidden;background:#000;touch-action:none;
  position:fixed;inset:0;
  /* iOSのゴム引っ張り・スクロール誤発火を抑止 */
  overscroll-behavior:none;
}
#gc{display:block;position:fixed;inset:0;width:100%;height:100%;z-index:1;touch-action:none;}

/* ══ HUD ══ */
#hud{display:none;position:fixed;top:0;left:0;right:0;z-index:20;pointer-events:none;}
#hud-inner{display:flex;justify-content:space-between;align-items:flex-start;padding:calc(10px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 0 calc(14px + env(safe-area-inset-left));
  background:linear-gradient(180deg,rgba(0,0,14,.85) 0%,transparent 100%);}
.hb{text-align:center;min-width:58px;}
.hl{display:block;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:3px;color:rgba(0,243,255,.45);margin-bottom:1px;}
.hv{display:block;font-family:'Orbitron',monospace;font-size:clamp(14px,3.8vw,20px);font-weight:700;color:#fff;text-shadow:0 0 10px #00f3ff;}
#skill-badge{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;padding:2px 6px;border-radius:3px;margin-top:2px;transition:all .2s;display:block;}
#skill-badge.r{background:rgba(0,243,255,.18);color:#00f3ff;border:1px solid rgba(0,243,255,.4);}
#skill-badge.c{background:rgba(255,80,0,.14);color:#ff5000;border:1px solid rgba(255,80,0,.3);}
/* speed bar */
#spb-wrap{position:fixed;top:calc(52px + env(safe-area-inset-top));left:0;right:0;height:3px;z-index:20;pointer-events:none;background:rgba(255,255,255,.05);}
#spb{height:100%;width:0%;transition:width .5s;background:linear-gradient(90deg,#00f3ff,#bd00ff);}
/* hyperdrive badge */
#hyper-badge{position:fixed;top:calc(58px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-family:'Orbitron',monospace;
  font-size:clamp(12px,3.5vw,18px);font-weight:900;letter-spacing:4px;color:#ff00cc;
  text-shadow:0 0 20px #ff00cc,0 0 40px #ff00cc;pointer-events:none;z-index:25;opacity:0;transition:opacity .25s;}
/* popup (near miss / just etc) */
#popup{position:fixed;top:34%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;
  font-size:clamp(16px,4.5vw,26px);font-weight:900;pointer-events:none;z-index:30;opacity:0;
  transition:opacity .15s;white-space:nowrap;}
/* just evade flash */
#evade-hud{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;
  font-size:clamp(13px,3.8vw,20px);font-weight:900;color:#fff;letter-spacing:3px;
  text-shadow:0 0 18px #fff,0 0 36px #00f3ff;pointer-events:none;z-index:31;opacity:0;transition:opacity .1s;}
/* combo flash */
#combo-flash{position:fixed;top:25%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;
  font-size:clamp(20px,5.5vw,38px);font-weight:900;color:#fff;text-shadow:0 0 18px #00f3ff;
  pointer-events:none;z-index:30;opacity:0;transition:opacity .25s;}
/* title unlock */
#title-unlock{position:fixed;top:20%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',monospace;
  font-size:clamp(13px,3.5vw,18px);font-weight:900;color:#ffd700;letter-spacing:2px;
  text-shadow:0 0 16px #ffd700;pointer-events:none;z-index:32;opacity:0;transition:opacity .2s;text-align:center;}
/* state indicator */
#state-ind{position:fixed;top:calc(58px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:3px;color:rgba(255,220,0,.9);text-shadow:0 0 8px rgba(255,200,0,.6);
  z-index:20;pointer-events:none;opacity:0;transition:opacity .15s;}
/* equipped title above player (HTML overlay) */
#player-title{position:fixed;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:2px;color:#ffd700;text-shadow:0 0 10px #ffd700;
  z-index:20;pointer-events:none;opacity:0;white-space:nowrap;}
/* slowmo vignette */
#slowmo-vig{position:fixed;inset:0;pointer-events:none;z-index:40;opacity:0;
  background:radial-gradient(ellipse at center,transparent 30%,rgba(255,200,0,.3) 100%);transition:opacity .06s;}
/* swipe hint */
#swipe-hint{position:fixed;bottom:calc(18px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;
  font-size:clamp(9px,2.4vw,11px);letter-spacing:2px;color:rgba(0,243,255,.5);text-align:center;
  z-index:20;pointer-events:none;line-height:1.7;transition:opacity .5s;}
/* coins HUD */
#coins-hud{position:fixed;top:calc(10px + env(safe-area-inset-top));right:calc(14px + env(safe-area-inset-right));font-family:'Share Tech Mono',monospace;font-size:10px;
  letter-spacing:2px;color:#ffd700;text-shadow:0 0 8px #ffd700;z-index:20;pointer-events:none;display:none;}

/* ══ OVERLAYS ══ */
.ov{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:rgba(0,0,12,.93);backdrop-filter:blur(8px);}
.ov.hid{display:none;}

/* ── TITLE MENU ── */
#title-menu{
  padding:calc(20px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(20px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));
  overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(var(--vh-real, 1px) * 100);}
.title-logo{font-family:'Orbitron',monospace;font-size:clamp(24px,7vw,44px);font-weight:900;
  letter-spacing:5px;color:#00f3ff;text-shadow:0 0 20px #00f3ff,0 0 60px rgba(0,243,255,.3);text-align:center;
  margin-bottom:2px;animation:logoPulse 2.4s ease-in-out infinite;}
@keyframes logoPulse{0%,100%{text-shadow:0 0 20px #00f3ff,0 0 60px rgba(0,243,255,.3);}
  50%{text-shadow:0 0 30px #00f3ff,0 0 80px rgba(0,243,255,.5);}}
.title-sub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;
  color:rgba(0,243,255,.4);text-align:center;margin-bottom:16px;}
.menu-btn{display:block;width:100%;max-width:280px;margin:0 auto 10px;padding:14px 0;
  font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:3px;
  text-align:center;border-radius:3px;cursor:pointer;min-height:48px;transition:box-shadow .15s;}
#btn-start{background:#00f3ff;color:#000;border:none;box-shadow:0 0 24px rgba(0,243,255,.6);
  clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);}
#btn-start:active{box-shadow:0 0 44px rgba(0,243,255,.95);}
#btn-gacha{background:transparent;color:#ffd700;border:1.5px solid rgba(255,215,0,.4);
  box-shadow:0 0 12px rgba(255,215,0,.2);}
#btn-gacha:active{background:rgba(255,215,0,.1);}
#btn-rank{background:transparent;color:rgba(0,243,255,.7);border:1.5px solid rgba(0,243,255,.2);}
.title-coins{font-family:'Share Tech Mono',monospace;font-size:12px;letter-spacing:2px;color:#ffd700;
  text-align:center;margin-bottom:14px;text-shadow:0 0 8px #ffd700;}
/* live ranking board */
#rank-board{width:100%;max-width:280px;margin:16px auto 0;border:1px solid rgba(0,243,255,.2);
  border-radius:4px;background:rgba(0,0,20,.6);padding:8px 10px;font-family:'Share Tech Mono',monospace;
  font-size:9px;color:rgba(0,243,255,.6);letter-spacing:1px;}
.rb-title{color:rgba(0,243,255,.45);letter-spacing:3px;margin-bottom:4px;font-size:8px;}
.rb-row{display:flex;justify-content:space-between;margin-bottom:2px;transition:color .3s;}

/* ── CHARACTER SELECT ── */
#sel-screen{padding:calc(16px + env(safe-area-inset-top)) calc(12px + env(safe-area-inset-right)) calc(16px + env(safe-area-inset-bottom)) calc(12px + env(safe-area-inset-left));overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(var(--vh-real, 1px) * 100);}
.sel-t{font-family:'Orbitron',monospace;font-size:clamp(14px,4vw,22px);font-weight:900;letter-spacing:5px;
  color:#00f3ff;text-shadow:0 0 16px #00f3ff;text-align:center;margin-bottom:2px;}
.sel-s{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:4px;color:rgba(0,243,255,.4);
  text-align:center;margin-bottom:10px;}
#pv-c{display:block;width:130px;height:130px;margin:0 auto 10px;border:1px solid rgba(0,243,255,.2);border-radius:6px;}
.char-row{display:flex;gap:7px;justify-content:center;margin-bottom:10px;flex-wrap:wrap;}
.cc{width:clamp(82px,25vw,102px);padding:9px 7px 7px;border-radius:6px;background:rgba(255,255,255,.03);
  border:1.5px solid rgba(255,255,255,.08);cursor:pointer;text-align:center;transition:all .18s;}
.cc.sel2{border-color:var(--cc);box-shadow:0 0 14px var(--cc);background:rgba(255,255,255,.06);}
.cc-ico{font-size:18px;margin-bottom:2px;}
.cc-nm{font-family:'Share Tech Mono',monospace;font-size:clamp(7px,2vw,9px);color:#dde;margin-bottom:2px;line-height:1.3;}
.cc-sk{font-family:'Share Tech Mono',monospace;font-size:7px;letter-spacing:1px;color:var(--cc);}
.cc-ds{font-family:'Share Tech Mono',monospace;font-size:7px;color:rgba(180,200,220,.4);margin-top:3px;line-height:1.4;text-align:left;}
#char-desc{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(200,220,255,.6);text-align:center;
  min-height:26px;margin-bottom:10px;line-height:1.6;max-width:290px;}
#go-btn{padding:13px 42px;font-family:'Orbitron',monospace;font-size:12px;font-weight:900;letter-spacing:3px;
  color:#000;background:#00f3ff;border:none;border-radius:3px;cursor:pointer;
  box-shadow:0 0 24px rgba(0,243,255,.65);clip-path:polygon(6px 0,100% 0,calc(100% - 6px) 100%,0 100%);min-height:48px;}
#go-btn:active{box-shadow:0 0 46px rgba(0,243,255,.95);}

/* ── GACHA ── */
#gacha-screen{padding:calc(18px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(var(--vh-real, 1px) * 100);}
.gacha-t{font-family:'Orbitron',monospace;font-size:clamp(14px,4vw,20px);font-weight:900;letter-spacing:4px;
  color:#ffd700;text-shadow:0 0 16px #ffd700;text-align:center;margin-bottom:4px;}
.gacha-sub{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:3px;color:rgba(255,215,0,.4);
  text-align:center;margin-bottom:10px;}
#gacha-preview-c{display:block;width:140px;height:140px;margin:0 auto 12px;border:1px solid rgba(255,215,0,.25);border-radius:6px;}
#gacha-result{font-family:'Orbitron',monospace;font-size:clamp(13px,3.5vw,18px);font-weight:900;
  color:#ffd700;text-align:center;margin-bottom:8px;min-height:22px;text-shadow:0 0 12px #ffd700;}
.gacha-btn-row{display:flex;gap:9px;justify-content:center;margin-bottom:14px;}
.gachbtn{padding:12px 22px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;
  border-radius:4px;cursor:pointer;min-height:46px;}
#btn-pull1{background:#ffd700;color:#000;border:none;box-shadow:0 0 16px rgba(255,215,0,.5);clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);}
#btn-pull10{background:transparent;color:#ffd700;border:1.5px solid rgba(255,215,0,.5);box-shadow:0 0 10px rgba(255,215,0,.2);}
.col-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;max-width:320px;margin:0 auto 12px;}
.col-item{aspect-ratio:1;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
  cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;
  transition:all .18s;position:relative;}
.col-item.owned{border-color:var(--ci);box-shadow:0 0 8px var(--ci);}
.col-item.locked{opacity:.35;filter:grayscale(1);}
.back-btn{padding:10px 28px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;
  background:transparent;color:rgba(200,220,255,.6);border:1px solid rgba(200,220,255,.2);
  border-radius:4px;cursor:pointer;min-height:44px;display:block;margin:0 auto;}

/* ── GAMEOVER ── */
#gover{padding:calc(18px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left));overflow-y:auto;-webkit-overflow-scrolling:touch;max-height:calc(var(--vh-real, 1px) * 100);}
.go-t{font-family:'Orbitron',monospace;font-size:clamp(22px,6.5vw,40px);font-weight:900;
  color:#ff1744;text-shadow:0 0 26px #ff1744;letter-spacing:4px;text-align:center;margin-bottom:5px;}
.go-sc{font-family:'Orbitron',monospace;font-size:clamp(13px,3.8vw,22px);color:#fff;text-align:center;margin-bottom:3px;}
.go-hi{font-family:'Share Tech Mono',monospace;font-size:12px;color:#ffd700;text-align:center;margin-bottom:12px;letter-spacing:2px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;max-width:320px;margin:0 auto 12px;}
.stat-card{background:rgba(0,243,255,.06);border:1px solid rgba(0,243,255,.18);border-radius:6px;padding:9px 8px;text-align:center;}
.stat-val{font-family:'Orbitron',monospace;font-size:clamp(13px,3.8vw,18px);font-weight:700;color:#00f3ff;display:block;}
.stat-lbl{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(200,220,255,.45);margin-top:2px;display:block;}
.reflex-card{background:rgba(189,0,255,.08);border:1px solid rgba(189,0,255,.3);border-radius:6px;padding:10px;
  text-align:center;max-width:320px;margin:0 auto 12px;}
.reflex-val{font-family:'Orbitron',monospace;font-size:clamp(22px,6.5vw,34px);font-weight:900;color:#bd00ff;
  text-shadow:0 0 14px #bd00ff;display:block;}
.reflex-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;color:rgba(200,220,255,.5);margin-top:2px;display:block;}
.title-reward{font-family:'Share Tech Mono',monospace;font-size:10px;color:#ffd700;text-align:center;
  margin-bottom:10px;letter-spacing:1px;min-height:16px;}
.go-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;}
.gbtn{padding:11px 26px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;border-radius:4px;cursor:pointer;min-height:46px;}
#btn-retry{background:#ff1744;color:#fff;border:none;box-shadow:0 0 14px rgba(255,23,68,.5);clip-path:polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);}
#btn-sel{background:transparent;color:rgba(200,220,255,.7);border:1px solid rgba(200,220,255,.22);}
#btn-line-share{background:#06C755;color:#fff;border:none;box-shadow:0 0 14px rgba(6,199,85,.5);width:100%;max-width:320px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;gap:7px;}
#btn-line-share.hid{display:none;}

/* scan lines */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.07) 2px,rgba(0,0,0,.07) 4px);}
</style>
</head>
<body>
<canvas id="gc"></canvas>

<!-- HUD -->
<div id="hud">
  <div id="hud-inner">
    <div class="hb"><span class="hl">SCORE</span><span class="hv" id="h-score">0</span></div>
    <div class="hb"><span class="hl">SKILL</span><span id="skill-badge" class="r">READY</span></div>
    <div class="hb"><span class="hl">COMBO</span><span class="hv" id="h-combo">×0</span></div>
    <div class="hb"><span class="hl">DIST</span><span class="hv" id="h-dist">0m</span></div>
  </div>
</div>
<div id="spb-wrap"><div id="spb"></div></div>
<div id="hyper-badge">⚡ HYPERDRIVE ⚡</div>
<div id="popup"></div>
<div id="evade-hud">!!! JUST EVADE !!!</div>
<div id="combo-flash"></div>
<div id="title-unlock"></div>
<div id="state-ind"></div>
<div id="player-title"></div>
<div id="slowmo-vig"></div>
<div id="swipe-hint">指で移動 ・ ↑フリックでJUMP ・ ↓ドラッグでDUCK ・ ダブルタップでSKILL</div>
<div id="coins-hud">🪙 <span id="coins-val">0</span></div>

<!-- TITLE MENU -->
<div class="ov" id="title-menu">
  <div class="title-logo">CYBER RUNNER</div>
  <div class="title-sub">黒工電子科 — ARCADE SYSTEM</div>
  <div class="title-coins">🪙 <span id="coins-title">0</span> COINS</div>
  <button class="menu-btn" id="btn-start">▶ START MISSION</button>
  <button class="menu-btn" id="btn-gacha">🎰 GACHA &amp; COLLECTION</button>
  <button class="menu-btn" id="btn-rank">🏆 RANKING</button>
  <div id="rank-board">
    <div class="rb-title">▶ LIVE RANKING — TOP 5</div>
    <div id="rb-rows"></div>
  </div>
</div>

<!-- CHARACTER SELECT -->
<div class="ov hid" id="sel-screen">
  <div class="sel-t">CHARACTER SELECT</div>
  <div class="sel-s">黒工電子科</div>
  <canvas id="pv-c" width="260" height="260"></canvas>
  <div class="char-row" id="char-row"></div>
  <div id="char-desc"></div>
  <!-- 改善9: スペックバー -->
  <div id="char-specs" style="margin-bottom:10px;"></div>
  <!-- プレイヤー名入力 -->
  <div style="margin-bottom:12px;width:100%;max-width:280px;">
    <label style="font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:3px;color:rgba(0,243,255,.5);display:block;margin-bottom:4px;">YOUR NAME (ランキング用)</label>
    <input id="name-input" type="text" maxlength="12" placeholder="名前を入力 (最大12文字)"
      style="width:100%;padding:9px 12px;background:rgba(0,243,255,.07);border:1px solid rgba(0,243,255,.3);
      border-radius:4px;color:#fff;font-family:'Share Tech Mono',monospace;font-size:16px;letter-spacing:2px;
      outline:none;box-sizing:border-box;-webkit-appearance:none;">
  </div>
  <button id="go-btn">START MISSION</button>
</div>

<!-- GACHA & COLLECTION -->
<div class="ov hid" id="gacha-screen">
  <div class="gacha-t">GACHA &amp; COLLECTION</div>
  <div class="gacha-sub">電子パーツを集めろ！</div>
  <canvas id="gacha-preview-c" width="280" height="280"></canvas>
  <div id="gacha-result"></div>
  <div class="gacha-btn-row">
    <button class="gachbtn" id="btn-pull1">1回 (50🪙)</button>
    <button class="gachbtn" id="btn-pull10">10回 (450🪙)</button>
  </div>
  <div class="col-grid" id="col-grid"></div>
  <button class="back-btn" id="btn-gacha-back">← BACK</button>
</div>

<!-- GAMEOVER / STATS -->
<div class="ov hid" id="gover">
  <div class="go-t">GAME OVER</div>
  <div class="go-sc" id="go-sc">SCORE: 0</div>
  <div class="go-hi" id="go-hi">BEST: 0</div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="reflex-card">
    <span class="reflex-val" id="reflex-age">--歳</span>
    <span class="reflex-lbl">ESTIMATED REFLEX AGE</span>
  </div>
  <div class="title-reward" id="title-reward"></div>
  <!-- 改善5: シェアテキスト表示エリア -->
  <button class="gbtn hid" id="btn-line-share">📱 LINEで結果をシェア</button>
  <div id="share-text" style="
    font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
    color:rgba(0,243,255,.5);border:1px solid rgba(0,243,255,.15);
    border-radius:4px;padding:8px 10px;max-width:320px;margin:0 auto 12px;
    white-space:pre-line;line-height:1.7;text-align:left;cursor:text;
    background:rgba(0,0,20,.4);min-height:20px;">
  </div>
  <div class="go-row">
    <button class="gbtn" id="btn-retry">RETRY</button>

//  LINEミニアプリ(LIFF)対応
//  ──────────────────────────────────────────────────────────
//  LINEの「LIFF」という仕組みでこのゲームをLINEミニアプリとして
//  動かすための設定です。使うには下記の手順が必要です：
//
//  1. https://developers.line.biz/console/ でLINEログイン用の
//     チャネルを作成し、その中で「LIFF」を追加する
//  2. LIFFアプリ作成時、エンドポイントURLにこのHTMLを公開した
//     URL（例: GitHub Pages や Glitch などでホストしたURL）を設定する
//  3. 発行された「LIFF ID」(数字-英数字の文字列)を下のLIFF_IDに入れる
//  4. LINEミニアプリとして開けば自動でLINEの表示名を取得し、
//     名前入力を省略できるようになります（取得できない場合は手入力にフォールバック）
//
//  LIFF_IDが未設定（あるいは初期化に失敗）の場合は、通常のWebページ
//  として問題なく動作します（LINE外のブラウザでのテストも可能）。
// ══════════════════════════════════════════════════════════════
const LIFF_ID = 'YOUR_LIFF_ID_HERE'; // ← ここにLINE Developersコンソールで発行したLIFF IDを入れる
let liffReady=false, liffInClient=false;

async function initLiff(){
  if(typeof liff==='undefined'||!LIFF_ID||LIFF_ID==='YOUR_LIFF_ID_HERE') return;
  try{
    await liff.init({liffId:LIFF_ID});
    liffReady=true;
    liffInClient=liff.isInClient();
    if(liff.isLoggedIn()){
      try{
        const profile=await liff.getProfile();
        if(profile&&profile.displayName){
          SD.playerName=profile.displayName.slice(0,12);
          const inp=document.getElementById('name-input');
          if(inp) inp.value=SD.playerName;
        }
      }catch(e){ /* プロフィール取得不可: 手入力にフォールバック */ }
    }
  }catch(e){ /* LIFF初期化失敗: 通常のWebページとして続行 */ }
}
initLiff();

// 結果をシェア（優先順位: LIFFのシェアターゲットピッカー → ネイティブ共有 → クリップボードコピー）
async function shareResult(){
  const btn=document.getElementById('btn-line-share');
  const shareEl=document.getElementById('share-text');
  const text=(shareEl&&shareEl.textContent)||'CYBER RUNNER をプレイしたよ！';
  try{
    if(liffReady&&liffInClient&&liff.isApiAvailable&&liff.isApiAvailable('shareTargetPicker')){
      await liff.shareTargetPicker([{type:'text',text}]);
      return;
    }
  }catch(e){ /* キャンセル等は無視してフォールバックへ */ }
  try{
    if(navigator.share){ await navigator.share({text}); return; }
  }catch(e){ /* ユーザーがキャンセルした場合などは無視 */ }
  try{
    await navigator.clipboard.writeText(text);
    if(btn){ const orig=btn.textContent; btn.textContent='✅ コピーしました！'; setTimeout(()=>{btn.textContent=orig;},1600); }
  }catch(e){ /* クリップボード不可：何もしない */ }
}

//  画面サイズ対応（スマホのアドレスバー/ノッチ/向き変化に追従）
//  ──────────────────────────────────────────────────────────
//  縦長スマホでは、横3レーン分の幅がそのままだと画面の左右に収まらない
//  （カメラが自機にかなり近いため）。これを解消するため、画面が縦長に
//  なるほどカメラを「同じ角度を保ったまま」少し後ろに引いて、3レーン
//  ＋自由移動の可動範囲がきちんと画面内に収まるようにしている。
// ══════════════════════════════════════════════════════════════
const BASE_FOV=62;
let restFOV=BASE_FOV;
const CAM_TARGET=new THREE.Vector3(0,0.8,-12);
const CAM_DIR0=new THREE.Vector3(0,3.2,9.5).sub(CAM_TARGET); // 初期カメラ位置→注視点 への基準オフセット
let CAM_BASE_Y=3.2, CAM_BASE_Z=9.5; // updateCamera()内のシェイク/上下動の基準値として参照される
function setRealVH(){
  // visualViewport があればそれを優先（ソフトキーボードやURLバーの変化に最も正確に追従）
  const h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  document.documentElement.style.setProperty('--vh-real',(h*0.01)+'px');
}
function resize(){
  setRealVH();
  const w=window.innerWidth, h=(window.visualViewport&&window.visualViewport.height)||window.innerHeight;
  renderer.setSize(w,h);
  camera.aspect=w/h;
  const ar=w/h;
  // ar=0.8(あまり縦長でない)で変化なし、ar=0.45(かなり縦長)に向けて滑らかに強める
  const t=Math.max(0,Math.min(1,(0.8-ar)/(0.8-0.45)));
  const camScale=1+t*0.28;   // カメラを最大28%後方へ（同じ注視角度を保つので歪みは出ない）
  restFOV=BASE_FOV+t*3;      // 視野角もわずかに（最大+3°）広げて微調整
  camera.fov=restFOV;
  camFOV=restFOV;
  const newPos=CAM_TARGET.clone().add(CAM_DIR0.clone().multiplyScalar(camScale));
  CAM_BASE_Y=newPos.y; CAM_BASE_Z=newPos.z;
  camera.position.z=CAM_BASE_Z;
  camera.position.y=CAM_BASE_Y;
  camera.lookAt(CAM_TARGET);
  camera.updateProjectionMatrix();
}

let _lastWarnBeepT=0;
function updateWarning(){
  let minD=999, minType=OBS_WALL;
  obsPool.forEach(g=>{
    if(!g.userData.active) return;
    const dz=g.position.z-PLAYER_Z;
    if(dz<0&&dz>-20&&Math.abs(g.position.x-playerX)<2.5){
      if(-dz<minD){ minD=-dz; minType=g.userData.type; }
    }
  });
  // 改善6: 障害物の種類別接近ビープ（7秒以内に1回、距離8以内）
  if(minD<8&&audioReady&&gstate==='playing'){
    const now=performance.now();
    if(now-_lastWarnBeepT>700){
      _lastWarnBeepT=now;
      const ctx=audioCtx,g2=ctx.createGain(),o=ctx.createOscillator();
      g2.connect(ctx.destination); o.connect(g2);
      const t=ctx.currentTime;
      const freq=minType===OBS_WALL?220:minType===OBS_BAR?330:440;
      o.type='square'; o.frequency.setValueAtTime(freq,t);
      g2.gain.setValueAtTime(0.04,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.08);
      o.start(); o.stop(t+0.08);
    }
  }
  if(minD<20){
    const t=1-minD/20;
    warnMat.color.setHex(t<0.5?0x00f3ff:(t>0.8?0xff1744:0xffd700));
    warnMat.opacity=t<0.5?t*0.35:(t-0.5)*0.7;
    grids.forEach(g=>{ if(!hyperActive) g.material.opacity=0.35+t*0.4; });
  } else {
    warnMat.opacity*=0.88;
    if(!hyperActive) grids.forEach(g=>{ g.material.opacity=0.35; });
  }
}

const SIGN_POOL_N=6;
const signPool=[];
const sc2d=document.createElement('canvas'); sc2d.width=512; sc2d.height=128;
const sc2dCtx=sc2d.getContext('2d');

function makeSignTex(txt){
  const ctx=sc2dCtx;
  ctx.clearRect(0,0,512,128);
  ctx.fillStyle='rgba(0,8,24,0.88)'; ctx.fillRect(0,0,512,128);
  ctx.strokeStyle='#00f3ff'; ctx.lineWidth=3; ctx.strokeRect(2,2,508,124);
  ctx.fillStyle='#00f3ff'; ctx.font='bold 50px monospace';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.shadowColor='#00f3ff'; ctx.shadowBlur=20;
  ctx.fillText(txt,256,64);
  return new THREE.CanvasTexture(sc2d);
}

const signGeo=new THREE.PlaneGeometry(4.5,1.1);
for(let i=0;i<SIGN_POOL_N;i++){
  const mat=new THREE.MeshBasicMaterial({map:makeSignTex(SIGN_TEXTS[i%SIGN_TEXTS.length]),transparent:true,opacity:0,side:THREE.DoubleSide});
  const m=new THREE.Mesh(signGeo,mat); m.visible=false; m.userData={active:false}; scene.add(m); signPool.push(m);
}
let signTimer=0;
function updateSigns(delta){
  signTimer+=delta;
  if(signTimer>4.2+Math.random()*3){
    signTimer=0;
    const s=signPool.find(m=>!m.userData.active);
    if(s){
      const idx=Math.floor(Math.random()*SIGN_TEXTS.length);
      s.material.map.dispose(); s.material.map=makeSignTex(SIGN_TEXTS[idx]); s.material.map.needsUpdate=true;
      s.material.opacity=0;
      const side=Math.random()<0.5?-1:1;
      s.position.set(side*(5+Math.random()*3),1.8+Math.random()*2,SPAWN_Z-Math.random()*18);
      s.rotation.y=side*(-0.22+Math.random()*0.14);
      s.userData.active=true; s.visible=true;
    }
  }
  signPool.forEach(m=>{
    if(!m.userData.active) return;
    m.position.z+=effSpeed*delta;
    const dz=m.position.z-PLAYER_Z;
    m.material.opacity=dz<-5?Math.min(0.9,(m.position.z-SPAWN_Z)/28*0.9):Math.max(0,m.material.opacity-delta*3);
    if(m.position.z>PLAYER_Z+10){ m.userData.active=false; m.visible=false; }
  });
}

let playerGroup=null, playerMesh=null, playerGlow=null, playerReflect=null;

function buildPlayer(prof){
  if(playerGroup) scene.remove(playerGroup);
  playerGroup=new THREE.Group();
  let geo;
  switch(prof.geo){
    case 'Sphere':   geo=new THREE.SphereGeometry(PLAYER_R,22,22); break;
    case 'Box':      geo=new THREE.BoxGeometry(0.82,0.82,0.82); break;
    case 'Cylinder': geo=new THREE.CylinderGeometry(0.42,0.42,0.88,18); break;
  }
  const mat=new THREE.MeshPhongMaterial({color:prof.color,emissive:prof.color,emissiveIntensity:0.55,specular:0xffffff,shininess:90});
  playerMesh=new THREE.Mesh(geo,mat);
  playerGroup.add(playerMesh);
  const gM=new THREE.MeshBasicMaterial({color:prof.color,transparent:true,opacity:0.1});
  playerGlow=new THREE.Mesh(new THREE.SphereGeometry(PLAYER_R*1.9,10,10),gM); playerGroup.add(playerGlow);
  const rMat=new THREE.MeshBasicMaterial({color:prof.color,transparent:true,opacity:0.18,side:THREE.DoubleSide});
  playerReflect=new THREE.Mesh(new THREE.PlaneGeometry(1.2,1.2),rMat);
  playerReflect.rotation.x=-Math.PI/2; playerReflect.position.y=FLOOR_Y-NORMAL_Y+0.01;
  playerGroup.add(playerReflect);
  playerGroup.position.set(playerX,playerY,PLAYER_Z);
  scene.add(playerGroup);
}

function updatePlayer(delta){
  if(isJump){ playerVY+=GRAVITY*delta; playerY+=playerVY*delta; if(playerY<=NORMAL_Y){playerY=NORMAL_Y;playerVY=0;isJump=false;showState('');} }
  if(isDuck&&!isJump) playerY=DUCK_Y; else if(!isJump) playerY=NORMAL_Y;
  const dxL=targetX-playerX;
  const prevX=playerX;
  playerX+=dxL*Math.min(1,LANE_LERP*delta);
  // 改善: 高速で指を動かした時に残像を自動スポーン（移動が滑らかでも軌跡が見える）
  if(Math.abs(playerX-prevX)>0.045) spawnTrail(prevX,playerY);
  playerGroup.position.set(playerX,playerY,PLAYER_Z);
  playerGroup.rotation.z=-dxL*0.22;
  playerGlow.rotation.y+=delta*2.2;
  const ty=isDuck?0.55:1.0, cy=playerGroup.scale.y;
  playerGroup.scale.y+=(ty-cy)*Math.min(1,18*delta);
  if(playerReflect) playerReflect.material.opacity=0.18*Math.max(0,1-(playerY-FLOOR_Y)/2.5);
  // aura by combo
  const aura=Math.min(0.4,combo*0.018);
  playerGlow.material.opacity=hyperActive?0.55:0.08+aura;
  playerGlow.scale.setScalar(hyperActive?2.4:1+aura*0.7);
  // player title DOM position
  updatePlayerTitleDOM();
}

function updateCamera(rawDelta){
  if(camShakeT>0){
    camShakeT-=rawDelta;
    const s=camShakeMag*(camShakeT/0.35);
    camera.position.x=(Math.random()-0.5)*s*2;
    camera.position.y=CAM_BASE_Y+(Math.random()-0.5)*s;
  } else { camera.position.x=0; }
  // dynamic FOV
  const tFOV=restFOV+Math.min(15,(gameSpeed-BASE_SPD*0.9)/4.5)+(hyperActive?5:0);
  camFOV+=(tFOV-camFOV)*Math.min(1,3*rawDelta);
  camera.fov=camFOV;
  // roll
  const dxL=targetX-playerX;
  camRoll+=(-dxL*0.044-camRoll)*Math.min(1,8*rawDelta);
  camera.rotation.z=camRoll;
  // jump bob
  const jB=isJump?-0.28*(playerY-NORMAL_Y)/3.5:0;
  camera.position.y+=(CAM_BASE_Y+jB-camera.position.y)*Math.min(1,6*rawDelta);
  // curve
  curvePhase+=rawDelta*0.18;
  camera.position.x+=Math.sin(curvePhase)*0.55*rawDelta*2;
  camera.updateProjectionMatrix();
}

//  AUDIO
// ══════════════════════════════════════════════════════════════
let audioCtx=null, engOsc=null, engGain=null, audioReady=false;
let beatInterval=null;
function startBeatLoop(){
  if(beatInterval) return;
  const BPM=128; const beat=60/BPM;
  // 4拍子キックパターン: 1,3拍にキック、2,4拍にハイハット
  let beatCount=0;
  beatInterval=setInterval(()=>{
    if(!audioReady||gstate!=='playing'){ return; }
    const ctx=audioCtx, t=ctx.currentTime;
    const b=beatCount%4;
    if(b===0||b===2){
      // 改善7: キックドラム（低周波ブリップ）
      const o=ctx.createOscillator(), g2=ctx.createGain();
      o.connect(g2); g2.connect(ctx.destination);
      o.type='sine'; o.frequency.setValueAtTime(80*(hyperActive?1.3:1),t);
      o.frequency.exponentialRampToValueAtTime(35,t+0.12);
      g2.gain.setValueAtTime(0.12,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.14);
      o.start(t); o.stop(t+0.14);
    } else {
      // ハイハット（高周波ノイズ的なクリック）
      const o=ctx.createOscillator(), g2=ctx.createGain();
      o.connect(g2); g2.connect(ctx.destination);
      o.type='square'; o.frequency.setValueAtTime(800,t);
      g2.gain.setValueAtTime(0.025,t); g2.gain.exponentialRampToValueAtTime(0.001,t+0.04);
      o.start(t); o.stop(t+0.04);
    }
    beatCount++;
  }, beat*1000);
}
function stopBeatLoop(){ if(beatInterval){ clearInterval(beatInterval); beatInterval=null; } }

function initAudio(){
  if(audioReady) return;
  try{
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    engOsc=audioCtx.createOscillator(); engGain=audioCtx.createGain();
    const flt=audioCtx.createBiquadFilter(); flt.type='lowpass'; flt.frequency.value=420;
    engOsc.type='sawtooth'; engOsc.frequency.value=55;
    engOsc.connect(flt); flt.connect(engGain); engGain.connect(audioCtx.destination);
    engGain.gain.value=0; engOsc.start(); audioReady=true;
  }catch(e){}
}
function updateEngineAudio(){
  if(!audioReady||!engOsc) return;
  const ratio=(effSpeed-BASE_SPD*0.9)/60;
  if(!hyperActive) engOsc.frequency.setTargetAtTime(55+Math.min(115,ratio*120),audioCtx.currentTime,0.1);
  engGain.gain.setTargetAtTime(gstate==='playing'?0.04+Math.min(0.07,ratio*0.08):0,audioCtx.currentTime,0.15);
}
function playSfx(type){
  if(!audioReady) return;
  const ctx=audioCtx, g=ctx.createGain(), o=ctx.createOscillator();
  g.connect(ctx.destination); o.connect(g); const t=ctx.currentTime;
  const sfxMap={
    item:   ()=>{ o.type='sine'; o.frequency.setValueAtTime(880,t); o.frequency.exponentialRampToValueAtTime(1320,t+0.08); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.18); o.start(); o.stop(t+0.18); },
    break:  ()=>{ o.type='square'; o.frequency.setValueAtTime(200,t); o.frequency.exponentialRampToValueAtTime(40,t+0.3); g.gain.setValueAtTime(0.22,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); o.start(); o.stop(t+0.35); },
    jump:   ()=>{ o.type='sine'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(680,t+0.12); g.gain.setValueAtTime(0.08,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.start(); o.stop(t+0.2); },
    hit:    ()=>{ o.type='square'; o.frequency.setValueAtTime(110,t); o.frequency.exponentialRampToValueAtTime(33,t+0.45); g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.start(); o.stop(t+0.5); },
    lane:   ()=>{ o.type='triangle'; o.frequency.setValueAtTime(660,t); o.frequency.exponentialRampToValueAtTime(880,t+0.07); g.gain.setValueAtTime(0.07,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12); o.start(); o.stop(t+0.12); },
    hyper:  ()=>{ o.type='sawtooth'; o.frequency.setValueAtTime(110,t); o.frequency.exponentialRampToValueAtTime(440,t+0.3); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); o.start(); o.stop(t+0.5); },
    nearmiss:()=>{ o.type='sine'; o.frequency.setValueAtTime(660,t); o.frequency.exponentialRampToValueAtTime(330,t+0.15); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.22); o.start(); o.stop(t+0.22); },
    coin:   ()=>{ o.type='sine'; o.frequency.setValueAtTime(1046,t); o.frequency.exponentialRampToValueAtTime(1568,t+0.1); g.gain.setValueAtTime(0.1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.2); o.start(); o.stop(t+0.2); },
  };

function getItemColor(){
  if(combo>=20) return 0xff00cc;       // 虹(マゼンタ)
  if(combo>=10) return 0xffd700;       // 金
  if(combo>=5)  return 0x00ffff;       // シアン
  return 0x00ff88;                     // 通常(緑)
}
function acquireItem(m, scoreMult){
  // scoreMult: 1=通常接触, 2=Sphere magnet, 0.5=Cylinder supermagnet
  const base=10;
  const comboBonus=1+Math.floor(combo/5);
  const pts=Math.round(base*comboBonus*scoreMult);
  score+=pts; combo++;
  if(combo>statMaxCombo){ statMaxCombo=combo; }
  statItemsGot++;
  updateHUD(); showCombo();
  // ハイパードライブトリガー
  if(combo>0&&combo%HYPER_TRIGGER===0) triggerHyper();
  // 称号チェック
  if(combo>=15) checkTitleUnlock('combo15');
  playSfx('item');
  deactivateItem(m);
}

// ══════════════════════════════════════════════════════════════
//  SKILL
// ══════════════════════════════════════════════════════════════
function activateSkill(){
  if(gstate!=='playing') return;
  initAudio();
  const now=performance.now();
  if(now-skillLast<selChar.cd) return;
  skillLast=now; skillCD=true;
  fireLaser(playerX);

  switch(selChar.skill){
    case 'MAGNET':
      // Sphere: 自レーンのアイテムに磁力フラグ（scoreMult=2）
      itemPool.forEach(m=>{
        if(!m.userData.active||m.userData.lane!==lane) return;
        if(m.position.z<PLAYER_Z&&m.position.z>PLAYER_Z-36){
          m.userData.magnetPull=true; m.userData.magnetMult=2.0;
          showBeam(m.position,playerGroup.position);
        }
      });
      break;

    case 'BREAK':{
      let closest=null, closestZ=-Infinity;
      obsPool.forEach(g=>{
        if(!g.userData.active||g.userData.type!==OBS_WALL||g.userData.lane!==lane) return;
        if(g.position.z<PLAYER_Z&&g.position.z>closestZ){ closestZ=g.position.z; closest=g; }
      });
      if(closest){
        const isJust=closestZ>PLAYER_Z-JUST_DIST;
        if(isJust){
          triggerSlowmo(100); triggerShake(0.2,0.3);
          score+=JUST_BONUS; showPopup(`⚡ JUST BREAK! +${JUST_BONUS}`,'#ffd700');
          spawnParticles(closest.position.clone(),0xffd700,20,1.4);
          // 後方へ飛散する破片（赤）
          spawnParticles({x:closest.position.x,y:closest.position.y,z:PLAYER_Z+1},0xff1744,15,1.8);
          checkTitleUnlock('justBreak');
        } else {
          spawnParticles(closest.position.clone(),0xff6600,10,0.8);
        }
        deactivateObs(closest); statWallBroken++; playSfx('break');
      }
      break;
    }

    case 'SUPER_MAGNET':
      // Cylinder: 全3レーン（scoreMult=0.5）
      itemPool.forEach(m=>{
        if(!m.userData.active) return;
        if(m.position.z<PLAYER_Z&&m.position.z>PLAYER_Z-36){
          m.userData.magnetPull=true; m.userData.magnetMult=0.5;
          showBeam(m.position,playerGroup.position);
        }
      });
      break;
  }
  setTimeout(()=>{ skillCD=false; },selChar.cd);
}

// ══════════════════════════════════════════════════════════════
//  MAGNET PULL UPDATE（非線形イージング）
//  二次関数的加速: 初速ゆっくり→自機に近づくほど爆速で吸収
// ══════════════════════════════════════════════════════════════
function updateMagnetPull(delta){
  itemPool.forEach(m=>{
    if(!m.userData.active||!m.userData.magnetPull) return;
    const dx=playerX-m.position.x;
    const dz=PLAYER_Z-m.position.z;
    const dist2=Math.sqrt(dx*dx+dz*dz)+0.001;
    // 距離が近いほど加速率が二次関数的に上昇
    // accel = k / dist^1.5 で磁力を近似
    const accel=Math.min(60, 2.2/Math.pow(dist2,1.5)*200)*delta;
    m.position.x+=dx/dist2*accel*dist2;
    m.position.z+=dz/dist2*accel*dist2;
    // プレイヤーに到達したら獲得
    if(dist2<0.7){
      acquireItem(m, m.userData.magnetMult);
    }
  });
}

// ══════════════════════════════════════════════════════════════
//  NEAR MISS & JUST EVADE
// ══════════════════════════════════════════════════════════════
function checkNearMiss(g){
  if(g.userData.passed) return;
  const dz=g.position.z-PLAYER_Z;
  if(dz>0&&dz<0.9){
    g.userData.passed=true;
    const dx=Math.abs(g.position.x-playerX);
    if(dx>=NEAR_INNER&&dx<=NEAR_OUTER){
      score+=50; statNearMiss++;
      if(statNearMiss>=10) checkTitleUnlock('nearmiss10');
      showPopup('NEAR MISS! +50','#00ff88');
      playSfx('nearmiss');
      triggerShake(0.06,0.18);
    }
    // JUST EVADE: 衝突判定のすぐ外側(NEAR_EVADE_D以内)
    if(dx>=1.0&&dx<1.0+NEAR_EVADE_D){
      statJustEvade++;
      // グリッド白フラッシュ（全画面ではなくグリッドのみ）
      grids.forEach(g2=>g2.material.color.setHex(0xffffff));
      setTimeout(()=>{ if(!hyperActive) grids.forEach(g2=>g2.material.color.setHex(0x00f3ff)); },120);
      const eh=document.getElementById('evade-hud');
      eh.style.opacity='1';
      clearTimeout(evadeTimer);
      evadeTimer=setTimeout(()=>{ eh.style.opacity='0'; },600);
    }
  }
}

// ══════════════════════════════════════════════════════════════
//  COLLISION DETECTION
// ══════════════════════════════════════════════════════════════
function checkCollisions(){
  const pz=PLAYER_Z, px=playerX, py=playerY;
  const zComp=Math.min(0.22,(gameSpeed-BASE_SPD)/120);

  // アイテム（通常接触: scoreMult=1）
  itemPool.forEach(m=>{
    if(!m.userData.active||m.userData.magnetPull) return;
    if(Math.abs(m.position.z-pz)<0.75&&Math.abs(m.position.x-px)<0.88){
      acquireItem(m,1.0);
    }
  });

  // 障害物
  obsPool.forEach(g=>{
    if(!g.userData.active) return;
    checkNearMiss(g);
    const dz=Math.abs(g.position.z-pz), dx=Math.abs(g.position.x-px);
    if(dz>2.3||dx>1.6) return;
    const type=g.userData.type; let hit=false; const zTh=0.85-zComp;
    if(type===OBS_WALL&&dz<zTh&&dx<1.05) hit=true;
    else if(type===OBS_BAR&&dz<0.65&&dx<1.15&&(!isJump||(py<FLOOR_Y+0.85))) hit=true;
    else if(type===OBS_GATE&&dz<0.65&&dx<1.2&&!isDuck) hit=true;
    if(hit) triggerGameOver();
  });
}

  if(isNewBest){ document.getElementById('go-sc').style.color='#ffd700'; document.getElementById('go-sc').style.textShadow='0 0 20px #ffd700'; }

// ══════════════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════════════
function loop(now){
  requestAnimationFrame(loop);
  if(lastTS===null) lastTS=now;
  let rawDelta=(now-lastTS)/1000; lastTS=now;
  if(rawDelta>0.1) rawDelta=0.1;
  const delta=rawDelta*timeScale;

  if(gstate!=='playing'){
    updateCamera(rawDelta);
    renderer.render(scene,camera);
    return;
  }

  elapsed+=delta; dist+=effSpeed*delta*0.1;

  // auto speed-up
  const nLv=Math.floor(elapsed/SPD_INC_INT);
  if(nLv>speedLevel){
    speedLevel=nLv;
    gameSpeed=BASE_SPD*selChar.speed*Math.pow(1+SPD_INC_RATE,speedLevel);
    statMaxSpeed=Math.max(statMaxSpeed,gameSpeed*hyperSpeedMult);
    spbEl.style.width=Math.min(100,(speedLevel/8)*100)+'%';
    grids.forEach(g=>{ g.material.opacity=0.9; });
    setTimeout(()=>{ if(!hyperActive) grids.forEach(g=>{ g.material.opacity=0.35; }); },160);
  }

  effSpeed=gameSpeed*hyperSpeedMult;

  spawnInterval=Math.max(0.35,0.95-elapsed*0.006);
  spawnT+=delta;
  if(spawnT>=spawnInterval){ spawnT=0; spawnNext(); }

  obsPool.forEach(g=>{
    if(!g.userData.active) return;
    g.position.z+=effSpeed*delta;
    if(g.userData.type===OBS_WALL) g.rotation.y+=delta*0.5;
    if(g.userData.type===OBS_GATE) g.rotation.z+=delta*2.4;
    if(g.position.z>DESPAWN_Z) deactivateObs(g);
  });

  itemPool.forEach(m=>{
    if(!m.userData.active) return;
    if(!m.userData.magnetPull){
      m.position.z+=effSpeed*delta;
      m.rotation.y+=delta*3.5;
      if(m.position.z>DESPAWN_Z){ combo=0; updateHUD(); deactivateItem(m); }
    }
    // 改善3: アイテムの色をコンボ数に応じてリアルタイム変化
    if(m.userData.active){
      m.material.color.setHex(getItemColor());
      m.material.emissive.setHex(getItemColor());
    }
  });

  scrollWorld(delta);
  updatePlayer(delta);
  updateMagnetPull(delta);
  updateLaser(delta);
  updateBeams(delta);
  updateParticles(delta);
  updateTrails(delta);
  updateStars(delta);
  updateSpeedLines(delta);
  updateSigns(delta);
  updateMarkers();
  updateWarning();
  checkCollisions();
  updateSkillHUD(now);
  updateCamera(rawDelta);
  updateEngineAudio();

  if(hyperActive) ptL2.intensity=2.5+Math.sin(elapsed*20)*1.6;
  else ptL2.intensity=1.4+Math.sin(elapsed*1.7+1.2)*0.4;
  ptL1.intensity=1.8+Math.sin(elapsed*2.3)*0.5;

  score+=Math.floor(effSpeed*delta*0.5); updateHUD();
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);

// ══════════════════════════════════════════════════════════════
//  PLAYER ACTIONS
// ══════════════════════════════════════════════════════════════
function doJump(){
  if(isJump||gstate!=='playing') return;
  isJump=true; isDuck=false; playerVY=JUMP_VY;
  statJumps++; showState('↑ JUMP'); playSfx('jump');
}
function startDuck(){
  if(isJump||gstate!=='playing') return;
  isDuck=true; showState('↓ DUCK');
}
function stopDuck(){ isDuck=false; showState(''); }
function moveLane(dir){
  if(gstate!=='playing') return;
  const nl=lane+dir; if(nl<0||nl>=3) return;
  // 残像スポーン
  spawnTrail(playerX,playerY); spawnTrail(playerX+(LANE_X[nl]-playerX)*0.4,playerY);
  lane=nl; targetX=LANE_X[nl]; playSfx('lane');
}

// ══════════════════════════════════════════════════════════════
//  TOUCH INPUT — 指の位置に直接追従（操作性改善版）
//  ・横方向: タッチしている画面上のX座標に自機が直接追従（3D投影を考慮した正確な対応）
//  ・上フリック: ジャンプ / 下ドラッグ保持: ダック / タップ素早く2回: スキル発動
// ══════════════════════════════════════════════════════════════
let touchActive=false, touchId=null;
let touchStartX=0, touchStartY=0, touchStartT=0;
let duckHeld=false, jumpFiredThisTouch=false, lastTapT=0;

// 自機が画面上で見えているスクリーンY(NDC)を取得し、その高さで指のXを3D空間Xへ変換する
// （遠近感を考慮し、指がどこにあっても「触れている場所＝自機の見える位置」になるようにする）
function getPlayerNdcY(){
  const v=new THREE.Vector3(0,NORMAL_Y,PLAYER_Z);
  v.project(camera);
  return v.y;
}
function screenXToWorldX(clientX){
  const w=window.innerWidth||1;
  const ndcX=(clientX/w)*2-1;
  const ndcY=getPlayerNdcY();
  const vec=new THREE.Vector3(ndcX,ndcY,0.5).unproject(camera);
  const dir=vec.sub(camera.position).normalize();
  if(Math.abs(dir.z)<1e-6) return targetX;
  const t=(PLAYER_Z-camera.position.z)/dir.z;
  const x=camera.position.x+dir.x*t;
  return Math.max(PLAY_X_MIN,Math.min(PLAY_X_MAX,x));
}
function followFinger(clientX){
  if(gstate!=='playing') return;
  targetX=screenXToWorldX(clientX);
  // スキルの対象レーン判定用に、現在最も近いレーンを更新
  let best=0,bd=Infinity;
  for(let i=0;i<LANE_X.length;i++){ const d=Math.abs(LANE_X[i]-targetX); if(d<bd){bd=d;best=i;} }
  lane=best;
}

const DUCK_DRAG_PX = ()=>Math.max(40,window.innerHeight*0.07);
const JUMP_FLICK_PX = ()=>Math.max(34,window.innerHeight*0.055);
const JUMP_FLICK_MS = 260;
const TAP_MOVE_PX = 18;
const TAP_TIME_MS = 260;
const DOUBLE_TAP_GAP_MS = 280;

canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0]; if(!t) return;
  touchActive=true; touchId=t.identifier;
  touchStartX=t.clientX; touchStartY=t.clientY; touchStartT=performance.now();
  duckHeld=false; jumpFiredThisTouch=false;
  initAudio();
  followFinger(t.clientX); // 触れた瞬間からその位置に追従開始
},{passive:false});

canvas.addEventListener('touchmove',e=>{
  if(!touchActive) return;
  e.preventDefault();
  let t=null;
  for(let i=0;i<e.touches.length;i++){ if(e.touches[i].identifier===touchId){ t=e.touches[i]; break; } }
  if(!t) t=e.touches[0];
  if(!t) return;

  followFinger(t.clientX);

  const dy=t.clientY-touchStartY;
  const elapsed2=performance.now()-touchStartT;

  // 上方向への素早いフリック＝ジャンプ（このタッチ中1回のみ）
  if(!jumpFiredThisTouch && dy<-JUMP_FLICK_PX() && elapsed2<JUMP_FLICK_MS){
    doJump(); jumpFiredThisTouch=true;
  }
  // 下方向にしっかりドラッグ＝ダック（保持している間、ジャンプ中でなければ継続的に維持）
  if(dy>DUCK_DRAG_PX()){
    duckHeld=true;
    if(!isJump&&!isDuck) startDuck(); // ジャンプ着地直後でも追従してダックに入れるよう毎フレーム確認
  } else if(duckHeld){
    duckHeld=false; if(isDuck) stopDuck();
  }
},{passive:false});

canvas.addEventListener('touchend',e=>{
  if(!touchActive) return;
  e.preventDefault();
  const t=e.changedTouches[0];
  if(duckHeld){ duckHeld=false; stopDuck(); }
  if(t){
    const dx=t.clientX-touchStartX, dy=t.clientY-touchStartY;
    const d=Math.sqrt(dx*dx+dy*dy), dt=performance.now()-touchStartT;
    // 小さく短いタップ＝ダブルタップでスキル発動
    if(d<TAP_MOVE_PX && dt<TAP_TIME_MS){
      const now2=performance.now();
      const sinceLast=now2-lastTapT; lastTapT=now2;
      if(sinceLast<DOUBLE_TAP_GAP_MS) activateSkill();
    }
  }
  touchActive=false; touchId=null;
},{passive:false});

canvas.addEventListener('touchcancel',()=>{
  touchActive=false; touchId=null;
  if(duckHeld){ duckHeld=false; stopDuck(); }
},{passive:false});

// ══════════════════════════════════════════════════════════════
//  KEYBOARD INPUT
// ══════════════════════════════════════════════════════════════
const keysDown=new Set();
document.addEventListener('keydown',e=>{
  if(keysDown.has(e.key)) return; keysDown.add(e.key);
  if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A'){e.preventDefault();moveLane(-1);}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){e.preventDefault();moveLane(1);}
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W'){e.preventDefault();doJump();}
  if(e.key==='ArrowDown'||e.key==='s'||e.key==='S'){e.preventDefault();startDuck();}
  if(e.key===' '){e.preventDefault();initAudio();activateSkill();}
});
document.addEventListener('keyup',e=>{ keysDown.delete(e.key); if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') stopDuck(); });

const pvC=document.getElementById('pv-c');
const pvR=new THREE.WebGLRenderer({canvas:pvC,antialias:true,alpha:true});
pvR.setPixelRatio(Math.min(window.devicePixelRatio,2)); pvR.setSize(260,260); pvR.setClearColor(0,0);
const pvSc=new THREE.Scene(), pvCam=new THREE.PerspectiveCamera(42,1,0.1,20);
pvCam.position.set(0,0.5,3.8); pvCam.lookAt(0,0,0);
pvSc.add(new THREE.AmbientLight(0x334488,2));
const pvL2=new THREE.DirectionalLight(0xffffff,1.8); pvL2.position.set(1,2,3); pvSc.add(pvL2);
const pvL3=new THREE.PointLight(0x00f3ff,2,10); pvL3.position.set(-1,1,2); pvSc.add(pvL3);
let pvMesh=null, pvGl=null;
function buildPvMesh(p){
  if(pvMesh){pvSc.remove(pvMesh);pvMesh.geometry.dispose();pvMesh.material.dispose();}
  if(pvGl){pvSc.remove(pvGl);pvGl.geometry.dispose();pvGl.material.dispose();}
  let g; switch(p.geo){
    case 'Sphere':   g=new THREE.SphereGeometry(0.95,36,36); break;
    case 'Box':      g=new THREE.BoxGeometry(1.45,1.45,1.45); break;
    case 'Cylinder': g=new THREE.CylinderGeometry(0.65,0.65,1.4,24); break;
  }
  pvMesh=new THREE.Mesh(g,new THREE.MeshPhongMaterial({color:p.color,emissive:p.color,emissiveIntensity:0.5,specular:0xffffff,shininess:120})); pvSc.add(pvMesh);
  pvGl=new THREE.Mesh(new THREE.SphereGeometry(1.3,10,10),new THREE.MeshBasicMaterial({color:p.color,transparent:true,opacity:0.09})); pvSc.add(pvGl);
}
(function pvLoop(){ requestAnimationFrame(pvLoop);
  if(pvMesh){pvMesh.rotation.y+=0.016;pvMesh.position.y=Math.sin(Date.now()*.0018)*.07;}
  if(pvGl) pvGl.rotation.y-=0.01;
  pvR.render(pvSc,pvCam);
})();

//  GACHA PREVIEW
// ══════════════════════════════════════════════════════════════
const gachC=document.getElementById('gacha-preview-c');
const gachR=new THREE.WebGLRenderer({canvas:gachC,antialias:true,alpha:true});
gachR.setPixelRatio(Math.min(window.devicePixelRatio,2)); gachR.setSize(280,280); gachR.setClearColor(0,0);
const gachSc=new THREE.Scene(), gachCam=new THREE.PerspectiveCamera(42,1,0.1,20);
gachCam.position.set(0,0.5,4); gachCam.lookAt(0,0,0);
gachSc.add(new THREE.AmbientLight(0x334488,2));
const gachL=new THREE.DirectionalLight(0xffffff,1.8); gachL.position.set(1,2,3); gachSc.add(gachL);
const gachL2=new THREE.PointLight(0xffd700,2,10); gachL2.position.set(-1,1,2); gachSc.add(gachL2);
let gachMesh=null;

function buildPartMesh(part){
  if(gachMesh){gachSc.remove(gachMesh);gachMesh.geometry.dispose();gachMesh.material.dispose();}
  let geo;
  switch(part.id){
    case 'resistor':   geo=new THREE.CylinderGeometry(0.25,0.25,1.2,12); break;
    case 'capacitor':  geo=new THREE.CylinderGeometry(0.5,0.5,0.8,16); break;
    case 'ic_chip':    geo=new THREE.BoxGeometry(1.4,0.2,1.0); break;
    case 'led':        geo=new THREE.ConeGeometry(0.4,0.8,16); break;
    case 'transistor': geo=new THREE.CylinderGeometry(0.45,0.3,1.0,3); break;
    case 'coil':       geo=new THREE.TorusGeometry(0.6,0.2,8,20); break;
    case 'diode':      geo=new THREE.CylinderGeometry(0.3,0.3,1.0,12); break;
    case 'cpu':        geo=new THREE.BoxGeometry(1.2,0.18,1.2); break;
    default:           geo=new THREE.BoxGeometry(1,1,1);
  }
  const mat=new THREE.MeshPhongMaterial({color:part.color,emissive:part.color,emissiveIntensity:0.5,specular:0xffffff,shininess:120,wireframe:part.id==='ic_chip'||part.id==='cpu'});
  gachMesh=new THREE.Mesh(geo,mat); gachSc.add(gachMesh);
}
(function gachLoop(){ requestAnimationFrame(gachLoop);
  if(gachMesh){gachMesh.rotation.y+=0.022;gachMesh.rotation.x+=0.008;gachMesh.position.y=Math.sin(Date.now()*.0016)*.06;}
  gachR.render(gachSc,gachCam);
})();

function buildCollectionGrid(){
  const grid=document.getElementById('col-grid'); grid.innerHTML='';
  PARTS.forEach(p=>{
    const owned=SD.unlockedItems.includes(p.id);
    const hex='#'+p.color.toString(16).padStart(6,'0');
    const el=document.createElement('div');
    el.className='col-item'+(owned?' owned':' locked');
    if(owned) el.style.setProperty('--ci',hex);
    el.textContent=p.icon;
    el.title=p.name+(owned?'':' (未取得)');
    el.addEventListener('click',()=>{ if(owned) buildPartMesh(p); });
    el.addEventListener('touchend',e=>{ e.preventDefault(); if(owned) buildPartMesh(p); });
    grid.appendChild(el);
  });
}

function pullGacha(n=1){
  const cost=n===1?50:450;
  if(SD.totalCoins<cost){ document.getElementById('gacha-result').textContent='コインが足りない！'; return; }
  SD.totalCoins-=cost;
  let lastPart=null;
  for(let i=0;i<n;i++){
    // レアリティ抽選: rarity3=5%, rarity2=20%, rarity1=75%
    const r=Math.random();
    const pool=r<0.05?PARTS.filter(p=>p.rarity===3):r<0.25?PARTS.filter(p=>p.rarity>=2):PARTS.filter(p=>p.rarity===1);
    const part=pool[Math.floor(Math.random()*pool.length)];
    if(!SD.unlockedItems.includes(part.id)) SD.unlockedItems.push(part.id);
    lastPart=part;
  }
  saveSave(); updateCoinsUI();
  document.getElementById('gacha-result').textContent=n===1?`✨ ${lastPart.name}！`:`✨ ${n}回引いた！`;
  buildPartMesh(lastPart);
  buildCollectionGrid();
  playSfx('coin');
}

function buildCharUI(){
  const row=document.getElementById('char-row'); row.innerHTML='';
  CHARS.forEach((c,i)=>{
    const hex='#'+c.color.toString(16).padStart(6,'0');
    const el=document.createElement('div');
    el.className='cc'+(i===selIdx?' sel2':''); el.style.setProperty('--cc',hex);
    el.innerHTML=`<div class="cc-ico">${c.icon}</div><div class="cc-nm">${c.name}</div><div class="cc-sk">${c.skill}</div><div class="cc-ds">${c.desc}</div>`;
    el.addEventListener('click',()=>selectChar(i));
    el.addEventListener('touchend',e=>{e.preventDefault();selectChar(i);});
    row.appendChild(el);
  });
}
function selectChar(i){
  selIdx=i; selChar=CHARS[i]; buildCharUI(); buildPvMesh(selChar);
  document.getElementById('char-desc').textContent=selChar.desc;
  // 改善9: スペックバー描画
  const specEl=document.getElementById('char-specs');
  if(specEl&&selChar.specs){
    const s=selChar.specs;
    const hex='#'+selChar.color.toString(16).padStart(6,'0');
    const bar=(v,max=5)=>`<div style="background:rgba(255,255,255,.1);border-radius:2px;height:5px;width:100%;"><div style="background:${hex};width:${v/max*100}%;height:100%;border-radius:2px;box-shadow:0 0 6px ${hex};"></div></div>`;
    specEl.innerHTML=`
      <div style="font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:2px;color:rgba(200,220,255,.5);display:grid;grid-template-columns:40px 1fr;gap:3px 6px;align-items:center;max-width:200px;margin:0 auto;">
        <span>SPEED</span>${bar(s.speed)}
        <span>POWER</span>${bar(s.power)}
        <span>RANGE</span>${bar(s.range)}
        <span>CD</span>${bar(s.cd)}
      </div>`;
  }
}
